<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JensenClaw</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Courier New', Consolas, monospace;
    background: #0a0a0a;
    color: #33ff33;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    text-shadow: 0 0 5px rgba(51, 255, 51, 0.5);
  }

  /* Jensen ghost image burned into the phosphor */
  #jensen-ghost {
    position: fixed;
    bottom: 0;
    right: 0;
    width: 45vh;
    max-width: 400px;
    opacity: 0.07;
    filter: grayscale(100%) brightness(2) sepia(100%) hue-rotate(70deg) saturate(3);
    pointer-events: none;
    z-index: 0;
    mask-image: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 85%);
    -webkit-mask-image: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0) 85%);
  }

  /* CRT scanline overlay */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0, 0, 0, 0.15) 2px,
      rgba(0, 0, 0, 0.15) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  /* CRT flicker */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(51, 255, 51, 0.03);
    animation: flicker 0.15s infinite alternate;
    pointer-events: none;
    z-index: 999;
  }

  @keyframes flicker {
    0% { opacity: 0.97; }
    100% { opacity: 1; }
  }

  .header-bar {
    background: #33ff33;
    color: #000;
    padding: 2px 8px;
    font-size: 13px;
    font-weight: bold;
    display: flex;
    justify-content: space-between;
    flex-shrink: 0;
    letter-spacing: 1px;
  }

  .header-bar .right { font-weight: normal; }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  #chat::-webkit-scrollbar { width: 8px; }
  #chat::-webkit-scrollbar-track { background: #0a0a0a; }
  #chat::-webkit-scrollbar-thumb { background: #1a5a1a; }

  .msg {
    animation: typeIn 0.1s ease;
    font-size: 14px;
    line-height: 1.5;
  }

  @keyframes typeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .msg .prefix { font-weight: bold; }
  .msg.user .prefix { color: #33aaff; text-shadow: 0 0 5px rgba(51, 170, 255, 0.5); }
  .msg.assistant .prefix { color: #33ff33; }

  .msg .text {
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.system {
    color: #1a6a1a;
    font-style: italic;
  }

  #thinking {
    color: #1aaa1a;
    font-size: 13px;
    padding: 0 16px;
    min-height: 20px;
    flex-shrink: 0;
  }

  #input-area {
    padding: 6px 16px 10px;
    border-top: 1px solid #1a5a1a;
    display: flex;
    gap: 0;
    flex-shrink: 0;
    align-items: center;
  }

  #input-prompt {
    color: #33ff33;
    font-size: 14px;
    font-family: inherit;
    white-space: pre;
  }

  #input {
    flex: 1;
    background: transparent;
    border: none;
    color: #33ff33;
    font-size: 14px;
    font-family: 'Courier New', Consolas, monospace;
    outline: none;
    caret-color: #33ff33;
    text-shadow: 0 0 5px rgba(51, 255, 51, 0.5);
  }

  #input::placeholder { color: #1a5a1a; }

  .footer-bar {
    background: #33ff33;
    color: #000;
    padding: 2px 8px;
    font-size: 11px;
    display: flex;
    justify-content: space-between;
    flex-shrink: 0;
  }
</style>
</head>
<body>

<img id="jensen-ghost" src="/jensen.jpg" alt="">

<div class="header-bar">
  <span>JENSENCLAW v0.1 // NEMOCLAW TERMINAL</span>
  <span class="right">NEMOTRON-3-SUPER-120B | NVIDIA INFERENCE</span>
</div>

<div id="chat">
  <div class="msg system">System initialized. RoboJensen online.</div>
  <div class="msg system">Type a message below. He's enthusiastic. He cannot be stopped.</div>
</div>

<div id="thinking"></div>

<div id="input-area">
  <span id="input-prompt">you&gt; </span>
  <input type="text" id="input" placeholder="talk to robojensen..." autocomplete="off" autofocus>
</div>

<div class="footer-bar">
  <span>CTRL-C EXIT | RUNNING ON OPENSHELL + NEMOCLAW</span>
  <span id="clock"></span>
</div>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const thinking = document.getElementById('thinking');
const clock = document.getElementById('clock');

let messages = [];
let streaming = false;

// Clock
setInterval(() => {
  const d = new Date();
  clock.textContent = d.toISOString().replace('T', ' ').slice(0, 19) + ' UTC';
}, 1000);

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;

  if (role === 'system') {
    div.textContent = text;
  } else {
    const prefix = document.createElement('span');
    prefix.className = 'prefix';
    prefix.textContent = role === 'user' ? 'you> ' : 'robojensen> ';

    const content = document.createElement('span');
    content.className = 'text';
    content.textContent = text;

    div.appendChild(prefix);
    div.appendChild(content);
  }

  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  return div;
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text || streaming) return;

  input.value = '';
  messages.push({ role: 'user', content: text });
  addMsg('user', text);

  streaming = true;
  thinking.textContent = '[ THINKING ] ...';

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages }),
    });

    if (!res.ok) {
      const err = await res.json();
      thinking.textContent = '';
      addMsg('system', `ERROR: ${err.error || res.statusText}`);
      return;
    }

    thinking.textContent = '[ STREAMING ] ...';

    const msgDiv = addMsg('assistant', '');
    const textSpan = msgDiv.querySelector('.text');
    let fullText = '';

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6).trim();
        if (data === '[DONE]') continue;

        try {
          const parsed = JSON.parse(data);
          const delta = parsed.choices?.[0]?.delta;
          const chunk = delta?.content || delta?.reasoning_content || '';
          if (chunk) {
            fullText += chunk;
            textSpan.textContent = fullText;
            chat.scrollTop = chat.scrollHeight;
          }
        } catch {}
      }
    }

    messages.push({ role: 'assistant', content: fullText });
  } catch (err) {
    addMsg('system', `CONNECTION ERROR: ${err.message}`);
  } finally {
    streaming = false;
    thinking.textContent = '';
    input.focus();
  }
}

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
</script>
</body>
</html>
